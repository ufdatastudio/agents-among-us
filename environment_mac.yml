name: amongus_mac
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10.19
  - pip=25.3
  - setuptools=80.9.0
  - wheel=0.45.1
  
  # Essential utilities
  - certifi=2026.1.4
  - ca-certificates=2026.1.4
  - openssl=3.6.0
  
  # Networking & async I/O
  - aiohappyeyeballs=2.6.1
  - aiohttp=3.13.3
  - aiosignal=1.4.0
  - anyio=4.12.1
  - async-timeout=5.0.1
  - attrs=25.4.0
  - frozenlist=1.7.0
  - h11=0.16.0
  - h2=4.3.0
  - hpack=4.1.0
  - httpcore=1.0.9
  - httpx=0.28.1
  - hyperframe=6.1.0
  - idna=3.11
  - multidict=6.7.0
  - propcache=0.3.1
  - pysocks=1.7.1
  - requests=2.32.5
  - sniffio=1.3.1
  - yarl=1.22.0
  - charset-normalizer=3.4.4
  - urllib3
  
  # Data structures & validation
  - annotated-types=0.7.0
  - pydantic=2.12.5
  - pydantic-core=2.41.5
  - typing-extensions=4.15.0
  - typing-inspection=0.4.2
  - exceptiongroup=1.3.1
  
  # Scientific computing & data processing
  - numpy=1.26.4
  - pandas=2.3.3
  - scipy
  - statsmodels=0.14.6
  - patsy=1.0.2
  
  # Compression & serialization
  - brotli=1.2.0
  - brotli-python=1.2.0
  - bzip2=1.0.8
  - lz4-c=1.10.0
  - snappy=1.2.2
  - zstd=1.5.7
  - zlib=1.3.1
  - protobuf=6.31.1
  - pyyaml=6.0.3
  - yaml=0.2.5
  
  # Visualization
  - matplotlib=3.10.8
  - matplotlib-base=3.10.8
  - seaborn=0.13.2
  - seaborn-base=0.13.2
  - pillow
  - contourpy=1.3.2
  - cycler=0.12.1
  - fonttools=4.61.1
  - kiwisolver=1.4.9
  - munkres=1.1.4
  - pyparsing=3.3.1
  
  # Font rendering (for matplotlib)
  - freetype=2.14.1
  - fontconfig=2.15.0
  - expat=2.7.3
  - libjpeg-turbo
  - libpng=1.6.53
  - libtiff=4.7.1
  - lcms2=2.17
  - openjpeg=2.5.4
  - libwebp-base=1.6.0
  
  # ML/AI ecosystem (HuggingFace)
  - huggingface_hub=0.36.0
  - safetensors=0.7.0
  - tokenizers
  
  # PyTorch (will use conda-forge Mac version)
  - pytorch::pytorch
  - pytorch::torchvision  
  - pytorch::torchaudio
  
  # Arrow/Parquet (data processing)
  - pyarrow=22.0.0
  - pyarrow-core=22.0.0
  
  # Utilities
  - tqdm=4.67.1
  - colorama=0.4.6
  - loguru=0.7.3
  - click
  - packaging=25.0
  - filelock=3.20.0
  - dill=0.4.0
  - future=1.0.0
  - fsspec  # Let conda handle the version
  
  # C/FFI support
  - cffi=2.0.0
  - pycparser=2.22
  
  # Date/time handling
  - python-dateutil=2.9.0
  - pytz=2025.2
  - python-tzdata=2025.3
  - tzdata=2025c
  
  # String/text processing
  - regex
  - unicodedata2=17.0.0
  
  # System libraries (Mac compatible)
  - ncurses=6.5
  - readline=8.3
  - libffi=3.5.2
  - libedit
  - libsqlite=3.51.1
  - libiconv
  - libxml2=2.15.1
  - libxslt=1.1.43
  - liblzma=5.8.1
  
  # GUI support (for PyGame/matplotlib, Mac compatible)
  - tk=8.6.13
  - tornado=6.5.4
  
  # Math libraries
  - qhull=2020.2
  - libopenblas=0.3.30
  
  # Flask & web framework
  - flask
  - jinja2
  - markupsafe
  
  # Other useful libraries
  - six=1.17.0
  
  # Install via pip (packages not well-supported in conda for Mac)
  - pip:
      # Transformers ecosystem
      - transformers>=4.57.0
      - accelerate>=1.12.0
      - sentencepiece>=0.2.0
      
      # HuggingFace utilities (with compatible version constraints)
      - datasets>=4.3.0
      - hf-transfer>=0.1.9
      - peft>=0.18.0
      
      # Advanced ML
      - compressed-tensors>=0.13.0
      
      # Math & scientific
      - scipy>=1.15.0
      - mpmath>=1.3.0
      - sympy>=1.14.0
      
      # Utilities (removed fsspec version - seemed to cause issues when downloading packages)
      - multiprocess>=0.70.16
      - networkx>=3.4.0
      - psutil>=7.2.0
      
      # Serialization
      - msgspec>=0.20.0
      
      # Type checking
      - typeguard>=4.4.0
      - tyro>=1.0.5
      - docstring-parser>=0.17.0
      
      # Flask extensions for web UI
      - flask-cors
      - flask-socketio
      - python-socketio
      - eventlet
      
      # Additional utilities
      - python-dotenv
      - jsonschema
      - importlib-metadata