<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration - Agents Among Us</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container config-container">
        <!-- Page Title -->
        <h1 class="title config-title">GAME CONFIGURATION</h1>

        <!-- Configuration Form -->
        <form id="configForm" action="/start_game" method="POST">

            <!-- Step 1: Number of Agents -->
            <section class="form-section">
                <h2 class="section-title">Step 1: Number of Agents</h2>
                <div class="form-group">
                    <label for="num_agents">How many agents? (4-12)</label>
                    <div class="input-with-button">
                        <input
                            type="number"
                            id="num_agents"
                            name="num_agents"
                            class="form-input agent-count-input"
                            min="4"
                            max="12"
                            value="4"
                            required
                            aria-label="Number of agents"
                        >
                        <button type="button" class="confirm-btn" id="confirmAgentsBtn">
                            CONFIRM
                        </button>
                    </div>
                    <small class="form-hint">Enter a number between 4 and 12, then click CONFIRM to generate the table.</small>
                </div>
            </section>

            <!-- Step 2: Agent Configuration Table -->
            <section class="form-section" id="agentTableSection">
                <h2 class="section-title">Step 2: Agent Configuration Table</h2>
                <div class="table-wrapper">
                    <table class="agent-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Model</th>
                                <th>Role</th>
                                <th>Color</th>
                            </tr>
                        </thead>
                        <tbody id="agentTableBody">
                            <!-- Rows generated by config.js on load and when CONFIRM is clicked -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Step 3: Game Settings -->
            <section class="form-section" id="gameSettingsSection">
                <h2 class="section-title">Step 3: Game Settings</h2>

                <div class="form-group">
                    <label for="num_rounds">Number of Rounds</label>
                    <input
                        type="number"
                        id="num_rounds"
                        name="num_rounds"
                        class="form-input"
                        value="10"
                        min="1"
                        max="20"
                        required
                        aria-label="Number of rounds"
                    >
                    <small class="form-hint">Between 1 and 20 rounds.</small>
                </div>

                <div class="form-group">
                    <label for="game_id">Game ID (optional)</label>
                    <input
                        type="text"
                        id="game_id"
                        name="game_id"
                        class="form-input"
                        placeholder="Auto-generated if empty"
                        aria-label="Game ID optional"
                    >
                    <small class="form-hint">Leave empty for auto-generated ID.</small>
                </div>
            </section>

            <!-- Action Buttons -->
            <div class="button-group">
                <button type="submit" class="config-btn start-game-btn" id="startBtn">
                    <span class="btn-icon">🚀</span>
                    START SIMULATION
                </button>
                <a href="/" class="config-btn back-btn">
                    <span class="btn-icon">←</span>
                    BACK TO MENU
                </a>
            </div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
</body>
</html>
