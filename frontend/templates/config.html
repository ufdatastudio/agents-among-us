<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Configuration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Game Configuration</h1>
        
        <form id="configForm" action="/start_game" method="POST">
            
            <!-- Number of Agents -->
            <div class="form-section">
                <h2>Number of Agents</h2>
                <div class="form-group">
                    <label for="num_agents">How many agents? (4-12)</label>
                    <div class="input-with-button">
                        <input 
                            type="number" 
                            id="num_agents" 
                            name="num_agents" 
                            class="agent-count-input" 
                            min="4" 
                            max="12" 
                            value="4"
                            required
                        >
                        <button type="button" id="confirmAgentsBtn">Confirm</button>
                    </div>
                    <small class="form-hint">Minimum 4, Maximum 12</small>
                </div>
            </div>
            
            <!-- Agent Configuration Table -->
            <div class="form-section">
                <h2>Configure Each Agent</h2>
                <table id="agentTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Model</th>
                            <th>Role</th>
                            <th>Color</th>
                        </tr>
                    </thead>
                    <tbody id="agentTableBody">
                        <!-- Generated by JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <!-- Game Settings -->
            <div class="form-section">
                <h2>Game Settings</h2>
                
                <div class="form-group">
                    <label for="num_rounds">Number of Rounds (1-20)</label>
                    <input 
                        type="number" 
                        id="num_rounds" 
                        name="num_rounds" 
                        min="1" 
                        max="20" 
                        value="10"
                        required
                    >
                    <small class="form-hint">How many rounds the game will last</small>
                </div>
                
                <div class="form-group">
                    <label for="game_id">Game ID (optional)</label>
                    <input 
                        type="text" 
                        id="game_id" 
                        name="game_id" 
                        placeholder="Auto-generated if empty"
                    >
                    <small class="form-hint">Leave empty for auto-generated ID</small>
                </div>
            </div>

            <!-- ML Classifiers -->
            <div class="form-section">
                <h2>ML Classifiers</h2>
                <div class="form-group">
                    <label>Select classifiers to display suspicion scores (optional):</label>
                    <div style="display: flex; gap: 20px; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" name="classifier_sgd" value="true">
                            <span>SGD</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" name="classifier_svm" value="true">
                            <span>SVM</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                            <input type="checkbox" name="classifier_lr" value="true">
                            <span>LR</span>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="button-group">
                <button type="submit">Start Simulation</button>
                <a href="/" class="btn">Back to Menu</a>
            </div>
        </form>
    </div>
    
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
</body>
</html>
